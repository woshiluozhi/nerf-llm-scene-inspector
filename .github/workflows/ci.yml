name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,video]"

      - name: Run tests
        run: pytest

      - name: Run lint
        run: ruff check .

      - name: Check CLI help
        run: |
          python scripts/check_env.py --json
          python scripts/create_capture_manifest.py --help
          python scripts/preflight_real_run.py --help
          python scripts/prepare_data.py --help
          python scripts/inspect_scene_data.py --help
          python scripts/train_baseline_nerf.py --help
          python scripts/train_language_field.py --help
          python scripts/query_scene.py --help
          python scripts/import_viewer_outputs.py --help
          python scripts/create_annotation_template.py --help
          python scripts/validate_annotations.py --help
          python scripts/review_annotations.py --help
          python scripts/generate_demo_assets.py --help
          python scripts/generate_portfolio_page.py --help
          python scripts/generate_project_site.py --help
          python scripts/analyze_prompt_sensitivity.py --help
          python scripts/analyze_scene_relations.py --help
          python scripts/evaluate_queries.py --help
          python scripts/audit_run.py --help
          python scripts/recommend_next_steps.py --help
          python scripts/create_evidence_scorecard.py --help
          python scripts/check_run_quality.py --help
          python scripts/create_reproduction_bundle.py --help
          python scripts/generate_research_report.py --help
          python scripts/create_submission_packet.py --help
          python scripts/create_real_run_plan.py --help
          python scripts/index_runs.py --help
          python scripts/compare_runs.py --help
          python scripts/run_experiment_matrix.py --help
          python scripts/export_portfolio_pack.py --help
          python scripts/validate_portfolio_pack.py --help
          python scripts/run_scene_pipeline.py --help
          python scripts/run_dry_run_demo.py --help

      - name: Run dry-run demo
        run: python scripts/run_dry_run_demo.py

      - name: Run practical pipeline dry-run
        run: python scripts/run_scene_pipeline.py --dry-run --query mug

      - name: Check run quality gate
        run: python scripts/check_run_quality.py --run-dir results/pipeline_runs/desk_scene --profile smoke

      - name: Generate project site
        run: python scripts/generate_project_site.py --output results/project_site/index.html --run-index results/pipeline_runs/run_index.json

      - name: Export run-scoped portfolio pack
        run: python scripts/export_portfolio_pack.py --run-dir results/pipeline_runs/desk_scene --zip

      - name: Validate portfolio pack
        run: python scripts/validate_portfolio_pack.py --pack results/portfolio_pack

      - name: Create submission packet
        run: python scripts/create_submission_packet.py --run-dir results/pipeline_runs/desk_scene --pack results/portfolio_pack --output results/submission_packet --repo-url https://github.com/woshiluozhi/nerf-llm-scene-inspector

      - name: Create real-run action plan
        run: python scripts/create_real_run_plan.py --run-dir results/pipeline_runs/desk_scene --output results/real_run_plan --input examples --type images --submission-packet results/submission_packet/submission_packet.json --repo-url https://github.com/woshiluozhi/nerf-llm-scene-inspector
